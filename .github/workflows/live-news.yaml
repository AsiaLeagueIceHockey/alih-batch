name: Scrape Asia League Ice Hockey News

on:
  workflow_dispatch: 
#  schedule:
#    - cron: '0 * * * *' 

jobs:
  scrape:
    # Playwright는 메모리를 많이 사용하므로, 
    # GitHub Runner에서 안정적인 실행을 위해 메모리 사용량을 고려해야 합니다.
    runs-on: ubuntu-latest 

    steps:
      - name: Check out repository
        uses: actions/checkout@v4 

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          # 💡 requests와 beautifulsoup4, google-genai 추가
          pip install supabase feedparser deep-translator playwright requests beautifulsoup4 google-genai

      # ⭐ 새로 추가된 단계: Playwright 브라우저 설치 ⭐
      - name: Install Playwright browsers
        run: |
          playwright install chromium

      - name: Run news scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scrape-news.py